entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: rbac_mlflow_traefik
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

log:
  level: INFO

api:
  dashboard: true
  insecure: true
